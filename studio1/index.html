<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blockbuster video</title>

    <!-- Normalize CSS for browser compatability -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <!-- My Styles -->
    <link href="styles.css" rel="stylesheet">

    <!-- My Script -->
    <script src="script.js" defer></script>


</head>
<body>
    <div id="loader">
        <p>Loading Video...</p>
    </div>

    <video id="myVideo" poster="media/lockin.jpg"  muted autoplay loop>
        <source src="media/lockin.webm" type="video/webm">
        <source src="media/lockin.mp4" type="video/mp4">

        <p>Your browser doesn't support HTML5 video
            Here is a <a href="media/lockin.mp4">link to the video</a> instead
        </p>
    </video>
    
    <div id="overlay">
        <img src="media/default_recording_overlay.png" alt="camera overlay">
    </div>

    <section>
        
        <h3 id="hover">Hover Over Text to Get Motivated</h3>

    </section>

</body>
</html>
